</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#eceef1]/50 transition-all text-[#005c9b]">
<span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span>

<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-white/80 rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-white/80 rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-white/80 rounded-bl-xl"></div>

<!-- Scanning Area Content -->
<div class="absolute inset-4 rounded-lg overflow-hidden flex items-center justify-center">
<!-- Mock QR Code -->
<div class="w-48 h-48 opacity-40 mix-blend-overlay">
<img alt="QR Code" class="w-full h-full object-contain" data-alt="Black and white abstract QR code pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0cOVqsawcrwfnCQdpMTB41kceQwPUoFfe0bYA30w9vPE2Jd-gfpPGSqt2o4TDXeuj5lRURbugTrAJnH_jwZCFb25NUrAuen1bm4peFIVoo8qYBEE4CmSxO7KntSjY5AIuB45uxLFop376I2gI9SiGyOa2cg0Jk8W7ng2ysmmd45rKhKE82NcfF5F5ll-czGbai7T1rlfAehgA2_hlzKPDiUoqCinUcZklaCNo4Hllfh10HbWr_RlOQCfN7DpB7AOcqX-4mQEBbvla"/>

</div>
</div>
<!-- UI Feedback & Controls -->
<div class="mt-12 w-full max-w-sm flex flex-col items-center gap-8">
<div class="text-center">
<h1 class="font-headline font-bold text-2xl text-white mb-2 tracking-tight">QR Scanner (EMS)</h1>
<p class="text-on-primary-container/70 text-sm font-medium uppercase tracking-widest">Scanning Patient Transfer ID</p>
</div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-white/10 rounded-full overflow-hidden backdrop-blur-md">
<div class="progress-bar-fill h-full bg-gradient-to-r from-primary to-primary-container shadow-[0_0_10px_rgba(46,117,182,0.5)]"></div>
</div>
<!-- Status Message (Simulated Success State) -->
<div class="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/10 backdrop-blur-xl border border-white/20 animate-pulse">
<span class="material-symbols-outlined text-white" style="font-variation-settings: &#39;FILL&#39; 1;">check_circle</span>
<span class="text-white font-bold tracking-wide">Scan Successful</span>
</div>
<!-- Secondary Actions -->
<div class="flex gap-4 w-full">
<button class="flex-1 flex items-center justify-center gap-2 h-14 bg-white/10 text-white rounded-xl font-bold backdrop-blur-md hover:bg-white/20 transition-all active:scale-95">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
<button class="flex-[3] flex items-center justify-center gap-2 h-14 bg-gradient-to-br from-primary to-primary-container text-white rounded-xl font-bold shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined">edit</span>
<span>Enter Code Manually</span>
</button>
</div>
</div>

<div class="p-4 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm">
<p class="text-[10px] uppercase font-bold text-white/40 tracking-widest mb-1">Crew Unit</p>
<p class="text-white font-headline font-bold">Medic 42</p>
</div>
<div class="p-4 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm">
<p class="text-[10px] uppercase font-bold text-white/40 tracking-widest mb-1">Destination</p>
<p class="text-white font-headline font-bold truncate">ST. JUDE ED</p>
</div>
</div>

<span class="font-[&#39;Manrope&#39;] text-[11px] font-semibold uppercase tracking-wider">Settings</span>
